@let isLoading = pageRequest.isLoading();
@let isError = pageRequest.error();

@if (isLoading) {
  <p data-automation-id="pages-are-loading">Loading pages</p>
} @else if (isError) {
  <p data-automation-id="loading-pages-failed">Something went wrong.</p>
  <button type="button" data-automation-id="retry-loading-pages" (click)="pageRequest.reload()">
    Retry
  </button>
} @else {
  <editor-ui-page-list
    [pages]="pageRequest.value()"
    data-automation-id="page-list-shown"
  ></editor-ui-page-list>
}
